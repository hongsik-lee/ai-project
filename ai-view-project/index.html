<!doctype html>
<html lang="ko">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>AI View Project Demo</title>
    <style>
      :root {
        color-scheme: light;
      }

      * {
        box-sizing: border-box;
      }

      body {
        margin: 0;
        min-height: 100vh;
        font-family: "Plus Jakarta Sans", "Noto Sans KR", -apple-system, BlinkMacSystemFont, "Segoe UI", sans-serif;
        background: linear-gradient(180deg, #efe9de 0%, #f5f2ea 100%);
        color: #111;
      }

      main {
        max-width: 880px;
        margin: 0 auto;
        padding: 2.5rem 1.5rem;
      }

      .card {
        background: #fff;
        border: 1px solid rgba(0, 0, 0, 0.08);
        border-radius: 16px;
        padding: 1.2rem;
        box-shadow: 0 12px 28px rgba(0, 0, 0, 0.08);
      }

      h1 {
        margin: 0;
        font-size: 2rem;
      }

      p {
        margin: 0.7rem 0 0;
        color: rgba(0, 0, 0, 0.7);
      }

      .list {
        margin-top: 1rem;
        padding-left: 1.15rem;
      }

      .back-link {
        display: inline-block;
        margin-top: 1rem;
        text-decoration: none;
        color: #2563eb;
        font-weight: 600;
      }
    </style>
  </head>
  <body>
    <main>
      <section class="card">
        <h1>AI View Project</h1>
        <p>View 프로젝트 데모 페이지입니다. 현재는 설계/기획 상태이며, 아래 항목을 중심으로 개발 예정입니다.</p>
        <ul class="list">
          <li>프로젝트 전용 시각화 화면 구성</li>
          <li>공통 컴포넌트/레이아웃 정리</li>
          <li>데이터 연동 화면 확장</li>
        </ul>
        <a class="back-link" href="/ai-project/">비주얼 허브로 돌아가기</a>
      </section>
    </main>
  </body>
</html>
