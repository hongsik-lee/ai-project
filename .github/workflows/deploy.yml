name: Deploy to GitHub Pages

on:
  push:
    branches: ["main"]
  workflow_dispatch:

permissions:
  contents: read
  pages: write
  id-token: write

concurrency:
  group: "pages"
  cancel-in-progress: true

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm
          cache-dependency-path: |
            ai-board-project/package-lock.json
            ai-react-project/package-lock.json

      - name: Install board dependencies
        run: npm ci
        working-directory: ai-board-project

      - name: Install react dependencies
        run: npm install
        working-directory: ai-react-project

      - name: Build board
        run: npm run build
        working-directory: ai-board-project
        env:
          VITE_API_BASE_URL: ${{ vars.VITE_API_BASE_URL }}

      - name: Build react
        run: npm run build
        working-directory: ai-react-project
        env:
          PUBLIC_URL: /${{ github.event.repository.name }}/react

      - name: Merge react build into pages artifact
        run: |
          mkdir -p ai-board-project/dist/react
          cp -R ai-react-project/build/. ai-board-project/dist/react/

      - name: Merge view page into pages artifact
        run: |
          mkdir -p ai-board-project/dist/view
          cp -R ai-view-project/. ai-board-project/dist/view/

      - name: Setup Pages
        uses: actions/configure-pages@v5

      - name: Upload artifact
        uses: actions/upload-pages-artifact@v3
        with:
          path: ./ai-board-project/dist

  deploy:
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    runs-on: ubuntu-latest
    needs: build
    steps:
      - name: Deploy to GitHub Pages
        id: deployment
        uses: actions/deploy-pages@v4
